<!DOCTYPE html><html lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Asegura tu pago - Organic Secure</title>
<!-- Google Fonts: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#b8d162',
              surface: '#f9f9fb',
              container: '#ffffff',
            }
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
    body {
      background-color: #f9f9fb;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .main-card {
      max-width: 450px;
      min-height: 100vh;
    }
    @media (min-width: 640px) {
      .main-card {
        min-height: auto;
        border-radius: 2rem;
      }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- BEGIN: Organic Secure Container -->
<main class="main-card w-full bg-white flex flex-col relative overflow-hidden" data-purpose="login-card">
<!-- BEGIN: Standardized Header -->
<header class="flex items-center justify-between p-4 bg-white border-b border-gray-50" data-purpose="header-navigation">
<button aria-label="Volver" class="p-2 text-gray-400 hover:text-gray-600 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-sm font-semibold text-gray-800 uppercase tracking-tight">Acceso</h2>
<button aria-label="Cerrar" class="p-2 text-gray-400 hover:text-gray-600 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- END: Header -->
<div class="px-6 py-8 flex flex-col items-center text-center flex-grow">
<!-- BEGIN: Illustration Section -->
<div class="mb-8" data-purpose="icon-container">
<div class="w-20 h-20 bg-[#f5f9eb] rounded-full flex items-center justify-center">
<div class="w-12 h-12 bg-brand-primary rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl">account_balance_wallet</span>
</div>
</div>
</div>
<!-- END: Illustration Section -->
<!-- BEGIN: Content Header -->
<section class="mb-10" data-purpose="content-text">
<h1 class="text-2xl font-bold text-gray-900 mb-3 tracking-tight">Asegura tu pago</h1>
<p class="text-[15px] text-gray-500 leading-relaxed px-4">
          Crea una cuenta para procesar tu pago de forma segura y hacer seguimiento de tu historial.
        </p>
</section>
<!-- END: Content Header -->
<!-- BEGIN: Auth Tabs Toggle -->
<nav class="w-full mb-10" data-purpose="auth-tabs">
<div class="bg-gray-50 p-1.5 rounded-full flex">
<button class="flex-1 py-3 px-4 text-[14px] font-medium text-gray-400 rounded-full hover:text-gray-600 transition-all duration-200" data-purpose="tab-create-account">
            Crear Cuenta
          </button>
<button class="flex-1 py-3 px-4 text-[14px] font-semibold text-gray-800 bg-white shadow-sm rounded-full" data-purpose="tab-login">
            Iniciar Sesión
          </button>
</div>
</nav>
<!-- END: TabToggle -->
<!-- BEGIN: LoginForm -->
<form action="#" class="w-full text-left flex flex-col h-full" data-purpose="login-form" method="POST">
<div class="mb-8">
<label class="block text-sm font-medium text-gray-700 mb-2.5 ml-1" for="email">
            Correo electrónico
          </label>
<input class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-brand-primary focus:bg-white transition-all outline-none" id="email" name="email" placeholder="Introduce tu correo" type="email" value="jhon.contreras@integry.co">
</div>
<!-- Spacer to push button to bottom if on mobile screen -->
<div class="flex-grow"></div>
<button class="w-full py-4.5 py-4 bg-brand-primary hover:bg-[#a6bd53] text-white font-bold rounded-full transition-all active:scale-[0.98] duration-150 uppercase tracking-widest text-[13px] mt-4" data-purpose="submit-button" type="submit">
          INICIAR SESIÓN
        </button>
</form>
<script>
document.querySelector('form[data-purpose="login-form"]').addEventListener('submit', function(e) {
  e.preventDefault();
  window.parent.postMessage({ type: 'GO', screen: 3 }, '*');
});
</script>
<script>
(function() {
  document.querySelectorAll('header button').forEach(function(btn) {
    var icon = btn.querySelector('.material-symbols-outlined');
    if (!icon) return;
    var name = (icon.dataset.icon || icon.textContent).trim();
    if (name === 'close') btn.style.visibility = 'hidden';
    if (name === 'arrow_back') btn.addEventListener('click', function() {
      window.parent.postMessage({ type: 'BACK' }, '*');
    });
  });
})();
</script>
<!-- END: LoginForm -->
</div>
</main>
<!-- END: LoginModal -->
</body></html>
