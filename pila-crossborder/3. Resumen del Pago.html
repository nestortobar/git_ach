<script>
    // Smooth interactions
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('touchstart', () => btn.classList.add('opacity-80'), {passive: true});
        btn.addEventListener('touchend', () => btn.classList.remove('opacity-80'), {passive: true});
    });
</script>
<script>
(function() {
  document.querySelectorAll('header button').forEach(function(btn) {
    var icon = btn.querySelector('.material-symbols-outlined');
    if (!icon) return;
    var name = (icon.dataset.icon || icon.textContent).trim();
    if (name === 'close') btn.style.visibility = 'hidden';
    if (name === 'arrow_back') btn.addEventListener('click', function() {
      window.parent.postMessage({ type: 'BACK' }, '*');
    });
  });
})();
</script>
<script>
document.querySelector('footer button').addEventListener('click', function() {
  window.parent.postMessage({ type: 'GO', screen: 4 }, '*');
});
</script>
