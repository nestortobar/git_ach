<span class="text-body-md font-bold text-on-surface">151.08</span>
</div>

</div>

<script>
    function selectCurrency(type) {
        const copBtn = document.getElementById('btn-COP');
        const usdBtn = document.getElementById('btn-USD');
        const mainAmount = document.getElementById('main-amount');
        const feeAmount = document.getElementById('fee-amount');

        if (type === 'COP') {
            copBtn.classList.add('border-on-surface/10', 'opacity-100', 'bg-white');
            copBtn.classList.remove('border-transparent', 'opacity-60', 'bg-white/40');
            
            usdBtn.classList.add('border-transparent', 'opacity-60', 'bg-white/40');
            usdBtn.classList.remove('border-on-surface/10', 'opacity-100', 'bg-white');
            
            mainAmount.innerText = "98.435,85 COP";
            feeAmount.innerText = "0,15 COP";
        } else {
            usdBtn.classList.add('border-on-surface/10', 'opacity-100', 'bg-white');
            usdBtn.classList.remove('border-transparent', 'opacity-60', 'bg-white/40');
            
            copBtn.classList.add('border-transparent', 'opacity-60', 'bg-white/40');
            copBtn.classList.remove('border-on-surface/10', 'opacity-100', 'bg-white');
            
            mainAmount.innerText = "151.08 US$";
            feeAmount.innerText = "0,05 US$";
        }
    }
</script>
<script>
(function() {
  document.querySelectorAll('header button').forEach(function(btn) {
    var icon = btn.querySelector('.material-symbols-outlined');
    if (!icon) return;
    var name = (icon.dataset.icon || icon.textContent).trim();
    if (name === 'close') btn.style.visibility = 'hidden';
    if (name === 'arrow_back') btn.addEventListener('click', function() {
      window.parent.postMessage({ type: 'BACK' }, '*');
    });
  });
})();
</script>
<script>
(function() {
  var BANKS = [
    'Ally Bank', 'Bank of America', 'BB&T', 'Capital One',
    'Charles Schwab Bank', 'Citibank', 'Citizens Bank',
    'Discover Bank', 'Fifth Third Bank', 'Goldman Sachs Bank',
    'HSBC USA', 'JPMorgan Chase', 'KeyBank', 'Morgan Stanley',
    'PNC Bank', 'Regions Bank', 'Truist Bank', 'TD Bank',
    'U.S. Bank', 'Wells Fargo'
  ];

  var input    = document.getElementById('bank-input');
  var dropdown = document.getElementById('bank-dropdown');
  var wrap     = document.getElementById('bank-wrap');
  var nextBtn  = document.getElementById('next-btn');
  var bankSelected = false;

  function setNextEnabled(enabled) {
    bankSelected = enabled;
    nextBtn.disabled = !enabled;
    if (enabled) {
      nextBtn.classList.remove('opacity-40', 'cursor-not-allowed');
      nextBtn.classList.add('hover:brightness-105', 'active:scale-[0.98]');
    } else {
      nextBtn.classList.add('opacity-40', 'cursor-not-allowed');
      nextBtn.classList.remove('hover:brightness-105', 'active:scale-[0.98]');
    }
  }

  function renderList(items) {
    dropdown.innerHTML = '';
    items.forEach(function(bank) {
      var el = document.createElement('div');
      el.textContent = bank;
      el.style.cssText = 'padding:13px 18px;font-size:14px;font-family:inherit;color:#111c2d;cursor:pointer;transition:background .12s;';
      el.addEventListener('mouseenter', function() { el.style.background = '#f0f3ff'; });
      el.addEventListener('mouseleave', function() { el.style.background = ''; });
      el.addEventListener('mousedown', function(e) {
        e.preventDefault();
        input.value = bank;
        dropdown.style.display = 'none';
        setNextEnabled(true);
      });
      dropdown.appendChild(el);
    });
  }

  function openWith(q) {
    var list = q
      ? BANKS.filter(function(b) { return b.toLowerCase().includes(q.toLowerCase()); })
      : BANKS;
    if (!list.length) { dropdown.style.display = 'none'; return; }
    renderList(list);
    dropdown.style.display = 'block';
  }

  input.addEventListener('focus', function() { openWith(this.value.trim()); });
  input.addEventListener('input', function() {
    setNextEnabled(false);
    openWith(this.value.trim());
  });

  document.addEventListener('click', function(e) {
    if (!wrap.contains(e.target)) dropdown.style.display = 'none';
  });
})();
</script>
<script>
document.getElementById('next-btn').addEventListener('click', function() {
  if (this.disabled) return;
  window.parent.postMessage({ type: 'GO', screen: 6 }, '*');
});
</script>
